apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: backend
    spec:
      # Pod 级安全上下文（deployment.spec.md §2.2 / security.spec.md）：非 root、只读根文件系统。
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # 优雅关闭宽限期（P0-12）：>= LIFESPAN_SHUTDOWN_TIMEOUT_SECONDS(20s) + 10s buffer。
      # SIGTERM 后 lifespan 在 20s 内完成 in-flight 请求与连接清理，超时才强制 SIGKILL。
      terminationGracePeriodSeconds: 30
      # 反亲和：2 replicas 尽量分布到不同节点，节点故障不全挂（§4.2 高可用）。
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aiops-console
                    app.kubernetes.io/component: backend
      containers:
        - name: backend
          image: aiops/backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: redis-url
            # 敏感凭据（JWT_SECRET / LLM API Key / DB 密码）走 aiops-secrets，
            # 非敏感配置（ENVIRONMENT / LOG_LEVEL / JWT_EXPIRE_HOURS / CORS / 限流阈值）
            # 走 aiops-config ConfigMap（deployment.spec.md§4.1 配置与密钥分离）
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: anthropic-api-key
            # 非敏感配置整批注入（envFrom 避免逐字段列举）
          envFrom:
            - configMapRef:
                name: aiops-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # readOnlyRootFilesystem 需可写 /tmp（Python/uvicorn/Prometheus 客户端临时文件）。
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: frontend
    spec:
      # Pod 级安全上下文：nginx-unprivileged 镜像以 UID 101 非 root 运行（§2.2）。
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      # 反亲和：2 replicas 尽量分布到不同节点（§4.3 高可用）。
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aiops-console
                    app.kubernetes.io/component: frontend
      containers:
        - name: frontend
          image: aiops/frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-config
                  key: vite_api_base_url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # nginx-unprivileged 需可写缓存与 PID 目录（readOnlyRootFilesystem 下挂 emptyDir）。
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
# PostgreSQL + pgvector 向量数据库（StatefulSet 保证稳定网络标识与持久卷）
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  serviceName: aiops-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: aiops
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Redis 缓存与消息队列
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# ConfigMap — 非敏感配置（deployment.spec.md§4.1 配置与密钥分离）
# 敏感值（JWT_SECRET / OPENAI_API_KEY / ANTHROPIC_API_KEY / DB 密码 / Redis 密码）
# 必须放入 aiops-secrets Secret，禁止写入本 ConfigMap。
# 完整变量清单见 .env.example 与 backend/app/core/config.py。
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  labels:
    app.kubernetes.io/name: aiops-console
data:
  # 基础
  ENVIRONMENT: "production"
  APP_VERSION: "0.1.0"
  LOG_LEVEL: "INFO"
  # JWT 过期（security.spec.md§2.2，密钥走 Secret）
  JWT_EXPIRE_HOURS: "24"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  # CORS（security.spec.md§4 禁 "*"，显式列举允许 Origin）
  CORS_ORIGINS: '["https://aiops.local"]'
  # 安全 — token 黑名单 + 登录失败锁定（P0-1/P0-2）
  TOKEN_BLACKLIST_ENABLED: "true"
  LOGIN_MAX_FAILURES: "5"
  LOGIN_LOCKOUT_MINUTES: "15"
  # LLM 默认（仅 provider/model，API Key 走 Secret）
  DEFAULT_LLM_PROVIDER: "openai"
  DEFAULT_LLM_MODEL: "gpt-4o-mini"
  # LLM 连接池 + 流式 chunk 超时（P0-21/P0-14）
  LLM_CLIENT_MAX_CONNECTIONS: "100"
  LLM_CLIENT_MAX_KEEPALIVE_CONNECTIONS: "20"
  LLM_STREAM_CHUNK_TIMEOUT_SECONDS: "30"
  # 数据库连接池（P0-11/P0-22）：recycle 主动回收避开 LB idle 超时，
  # statement_timeout 让 PG 主动 kill 慢查询防连接池耗尽。
  DB_POOL_RECYCLE_SECONDS: "1800"
  DB_POOL_TIMEOUT_SECONDS: "10"
  DB_STATEMENT_TIMEOUT_MS: "30000"
  # 限流阈值（security.spec.md§5）
  RATE_LIMIT_DEFAULT_PER_MIN: "100"
  RATE_LIMIT_LLM_PER_MIN: "20"
  # fire-and-forget task 背压上限（P0-10）：生产建议 50~200，0=不限。
  TASK_REGISTRY_MAX_CONCURRENCY: "100"
  # Agent 执行超时（P0-20）：HTTP 请求级整体超时，超时抛 504。
  AGENT_EXECUTE_TIMEOUT_SECONDS: "180"
  # Agent autonomous loop worker（P0-2）：默认关闭，按需启用。
  # 启用时 lease_seconds 应 >= timeout_seconds*2 + buffer（崩溃恢复阈值）。
  AGENT_SCHEDULER_ENABLED: "false"
  AGENT_SCHEDULER_INTERVAL_SECONDS: "60"
  AGENT_SCHEDULER_CONCURRENCY: "5"
  AGENT_SCHEDULER_TIMEOUT_SECONDS: "300"
  AGENT_SCHEDULER_LEASE_SECONDS: "600"
  # Online eval 生产采样率（P0-3/C5）：0=关闭，0.05=5% 流量采样。
  # 生产建议 0.01~0.1 按流量与 LLM judge 成本权衡。
  ONLINE_EVAL_SAMPLE_RATE: "0.05"
  ONLINE_EVAL_SAMPLE_RATE_BOOST: "5.0"
  ONLINE_EVAL_PRIORITY_INPUT_LEN_THRESHOLD: "200"
  # lifespan 优雅关闭整体超时（P0-12）：K8s terminationGracePeriodSeconds
  # 应 >= 此值 + 10s buffer（见 backend Deployment spec）。
  LIFESPAN_SHUTDOWN_TIMEOUT_SECONDS: "20"
  # A1：多副本共享预算。HPA 2-6 replicas 下内存版预算失效（每 pod 独立计数），
  # 启用 Redis ZSET 实现保证熔断判定基于全局真实 token 消耗。
  AGENT_COST_BUDGET_REDIS_ENABLED: "true"
  # 前端
  VITE_API_BASE_URL: "/api/v1"
---
# PodDisruptionBudget — voluntary disruption 期间保证至少 1 个可用（§4.2/§4.3）
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aiops-backend-pdb
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aiops-frontend-pdb
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: frontend
---
# HorizontalPodAutoscaler — 基于 CPU 自动扩缩（§4.2/§4.3）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiops-backend-hpa
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiops-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiops-frontend-hpa
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiops-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

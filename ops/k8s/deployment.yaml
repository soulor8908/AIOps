apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: aiops/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: redis-url
            # 敏感凭据（JWT_SECRET / LLM API Key / DB 密码）走 aiops-secrets，
            # 非敏感配置（ENVIRONMENT / LOG_LEVEL / JWT_EXPIRE_HOURS / CORS / 限流阈值）
            # 走 aiops-config ConfigMap（deployment.spec.md§4.1 配置与密钥分离）
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: anthropic-api-key
            # 非敏感配置整批注入（envFrom 避免逐字段列举）
          envFrom:
            - configMapRef:
                name: aiops-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: aiops/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aiops-config
                  key: vite_api_base_url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 5173
      protocol: TCP
---
# PostgreSQL + pgvector 向量数据库（StatefulSet 保证稳定网络标识与持久卷）
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  serviceName: aiops-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: aiops
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Redis 缓存与消息队列
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# ConfigMap — 非敏感配置（deployment.spec.md§4.1 配置与密钥分离）
# 敏感值（JWT_SECRET / OPENAI_API_KEY / ANTHROPIC_API_KEY / DB 密码 / Redis 密码）
# 必须放入 aiops-secrets Secret，禁止写入本 ConfigMap。
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  labels:
    app.kubernetes.io/name: aiops-console
data:
  # 基础
  ENVIRONMENT: "production"
  APP_VERSION: "0.1.0-alpha"
  LOG_LEVEL: "INFO"
  # JWT 过期（security.spec.md§2.2，密钥走 Secret）
  JWT_EXPIRE_HOURS: "24"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  # CORS（security.spec.md§4 禁 "*"，显式列举允许 Origin）
  CORS_ORIGINS: '["https://aiops.local"]'
  # LLM 默认（仅 provider/model，API Key 走 Secret）
  DEFAULT_LLM_PROVIDER: "openai"
  DEFAULT_LLM_MODEL: "gpt-4o-mini"
  # 限流阈值（security.spec.md§5）
  RATE_LIMIT_DEFAULT_PER_MIN: "100"
  RATE_LIMIT_LLM_PER_MIN: "20"
  # 前端
  VITE_API_BASE_URL: "/api/v1"
---
# PodDisruptionBudget — voluntary disruption 期间保证至少 1 个可用（§4.2/§4.3）
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aiops-backend-pdb
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aiops-frontend-pdb
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: frontend
---
# HorizontalPodAutoscaler — 基于 CPU 自动扩缩（§4.2/§4.3）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiops-backend-hpa
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiops-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiops-frontend-hpa
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiops-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: aiops/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: aiops/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: /api/v1
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-frontend
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 5173
      protocol: TCP
---
# PostgreSQL + pgvector 向量数据库（StatefulSet 保证稳定网络标识与持久卷）
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  serviceName: aiops-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: aiops
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aiops"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-db
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Redis 缓存与消息队列
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-console
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-console
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-redis
  labels:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aiops-console
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP

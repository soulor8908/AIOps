# AIOps Console Frontend — nginx 配置（SPA 托管 dist/）
# 生产环境以 nginx 提供静态资源，不再运行 Vite dev server。

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩文本类资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # SPA 路由：未命中静态文件时回退到 index.html（vue-router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 构建产物带 hash 文件名，可长期强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存，保证发布即时生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 反向代理 API 到后端服务（K8s Service 名 aiops-backend，端口 80→targetPort 8000）
    location /api/ {
        proxy_pass http://aiops-backend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }
}

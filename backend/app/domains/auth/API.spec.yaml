# Auth 领域 OpenAPI 子集（/api/v1/auth）
# 真源：对齐 app/core/security.py 与 init.sql users 表。
# 与 /workspace/AIOps/specs/openapi.yaml 的统一错误体 {error, message, detail} 一致。

openapi: 3.1.0
info:
  title: AIOps Console API — Auth
  description: 认证与授权领域 OpenAPI 子集（register / token / me / refresh）。
  version: 0.1.0-alpha
servers:
- url: http://localhost:8000
  description: Local
- url: https://api.aiops.local
  description: Production
tags:
- name: auth
  description: 认证授权 — 注册 / 登录 / 当前用户 / token 刷新
paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register
      description: 用户注册。校验 email 唯一、密码最小 8 位后写入 users 表（bcrypt 哈希）。
      operationId: register_api_v1_auth_register_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserCreate'}
      responses:
        '201':
          description: 注册成功，返回新建用户。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '409':
          description: email 或 username 已存在。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/token:
    post:
      tags: [auth]
      summary: Token
      description: 登录获取 token。接收 OAuth2PasswordRequestForm（username=email, password），校验 bcrypt 后签发 access + refresh token。
      operationId: token_api_v1_auth_token_post
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/Body_token_api_v1_auth_token_post'}
      responses:
        '200':
          description: 登录成功，返回 token 包。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Token'}
        '401':
          description: 凭证错误 / 用户停用。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Me
      description: 获取当前登录用户信息。需携带 Bearer access token。
      operationId: me_api_v1_auth_me_get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 当前用户信息。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserOut'}
        '401':
          description: 未认证 / token 过期 / 用户停用。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh
      description: 使用 refresh token 换取新的 access token（并轮换 refresh token）。refresh token 过期或无效返回 401。
      operationId: refresh_api_v1_auth_refresh_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RefreshRequest'}
      responses:
        '200':
          description: 刷新成功，返回新 token 包。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Token'}
        '401':
          description: refresh token 无效或过期。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Authorization: Bearer <access_token>（HS256 JWT）'
  schemas:
    Error:
      type: object
      required: [error, message, detail]
      properties:
        error:
          type: string
          description: 错误类型标识（authentication_error / token_expired / authorization_error / conflict / validation_error / internal_error）。
        message:
          type: string
          description: 面向用户的可读错误信息。
        detail:
          description: 附加详情（可为字符串、数组或对象）。
      description: 统一错误响应体。
    UserCreate:
      type: object
      required: [email, username, password]
      properties:
        email: {type: string, format: email, title: Email}
        username: {type: string, minLength: 1, maxLength: 64, title: Username}
        full_name: {type: string, maxLength: 128, title: Full Name}
        password: {type: string, minLength: 8, maxLength: 128, format: password, title: Password, description: 明文密码，落库前 bcrypt 哈希}
      title: UserCreate
      description: 注册入参。
    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email, title: Email}
        password: {type: string, minLength: 8, format: password, title: Password}
      title: UserLogin
      description: 登录入参（JSON 形式；/auth/token 走 OAuth2PasswordRequestForm）。
    UserOut:
      type: object
      required: [id, email, username, is_active, created_at, role]
      properties:
        id: {type: string, format: uuid, title: Id}
        email: {type: string, format: email, title: Email}
        username: {type: string, title: Username}
        full_name: {type: string, nullable: true, title: Full Name}
        is_active: {type: boolean, title: Is Active}
        created_at: {type: string, format: date-time, title: Created At}
        role:
          type: string
          enum: [admin, user]
          title: Role
          description: 由 users.is_admin 派生（is_admin=true → admin）。
      title: UserOut
      description: 用户对外视图。
    TokenData:
      type: object
      properties:
        sub: {type: string, nullable: true, title: Sub, description: user_id}
        type:
          type: string
          enum: [access, refresh]
          nullable: true
          title: Type
        exp: {type: integer, nullable: true, title: Exp, description: 过期时间戳}
      title: TokenData
      description: JWT 解析后的载荷。
    Token:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: {type: string, title: Access Token}
        refresh_token: {type: string, title: Refresh Token}
        token_type: {type: string, default: bearer, title: Token Type}
        expires_in: {type: integer, title: Expires In, description: access token 有效秒数}
      title: Token
      description: 登录 / 刷新返回的 token 包。
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: {type: string, minLength: 1, title: Refresh Token}
      title: RefreshRequest
      description: 刷新请求体。
    Body_token_api_v1_auth_token_post:
      type: object
      required: [username, password]
      properties:
        username: {type: string, title: Username, description: email}
        password: {type: string, format: password, title: Password}
      title: Body_token_api_v1_auth_token_post
      description: OAuth2PasswordRequestForm（application/x-www-form-urlencoded）。
  responses:
    BadRequest:
      description: 请求格式或语义错误（400 Bad Request）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    UnprocessableEntity:
      description: 请求参数校验失败（422 Validation Error）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    InternalServerError:
      description: 服务器内部错误（500 Internal Server Error）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}

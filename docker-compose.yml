# 本地开发环境（dev server + 热重载）。生产部署见 DEPLOYMENT.md 与 ops/k8s/。
#
# deploy.resources.limits 为开发机资源上限（防止单容器吃满宿主机内存/CPU
# 影响其他服务）。生产环境资源限制由 K8s deployment.yaml 的 resources.requests/
# limits 管理，与此处独立。
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  backend:
    build:
      context: .
      dockerfile: ops/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:aiops@db:5432/aiops
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  frontend:
    # dev server 跑 Vite（热重载）；生产镜像（nginx 托管 dist/）见 ops/Dockerfile.frontend，
    # 不要在此用 build，frontend/ 下无 Dockerfile。
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    # 不设 VITE_API_BASE_URL：client.ts 默认用相对路径 /api/v1，
    # 由 vite.config.ts 的 server.proxy 转发到 http://localhost:8000（同源，无 CORS）。
    # 后端 CORS_ORIGINS 默认已放行 localhost:5173 / 127.0.0.1:5173。
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

volumes:
  postgres_data:

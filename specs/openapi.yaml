# AIOps Console API - OpenAPI 3.1.0 specification
# 真源：由 FastAPI 应用导出的 /tmp/openapi_export.json
# 本文件在导出 schema 基础上补齐 metadata、tags、描述与统一错误响应。

openapi: 3.1.0
info: {title: AIOps Console API, description: AI原生运营控制台后端API, version: 0.1.0-alpha}
servers:
- {url: 'http://localhost:8000', description: Local}
- {url: 'https://api.aiops.local', description: Production}
tags:
- {name: meta, description: 系统元信息 — 健康检查、根路径}
- {name: auth, description: 认证授权 — 注册 / 登录 / 当前用户 / token 刷新}
- {name: prompts, description: Prompt Studio — 版本化 Prompt 管理、回滚、diff}
- {name: agents, description: Agent Orchestrator — Agent 定义与执行}
- {name: workflows, description: 工作流 DAG 编排与执行}
- {name: knowledge-bases, description: 知识库 — 文档上传、分块、语义检索、RAG}
- {name: models, description: Model Router — 多模型配置、路由、聊天补全}
- {name: analytics, description: Conversation Analytics — 对话记录与质量分析}
- {name: evals, description: Eval Suite — 规则测试与 LLM-as-judge 评估}
paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register
      description: 用户注册。校验 email 唯一、密码最小 8 位后写入 users 表（bcrypt 哈希）。
      operationId: register_api_v1_auth_register_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserCreate'}
      responses:
        '201':
          description: 注册成功，返回新建用户。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserOut'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/token:
    post:
      tags: [auth]
      summary: Token
      description: 登录获取 token。接收 OAuth2PasswordRequestForm（username=email, password），校验 bcrypt 后签发 access + refresh token。
      operationId: token_api_v1_auth_token_post
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/Body_token_api_v1_auth_token_post'}
      responses:
        '200':
          description: 登录成功，返回 token 包。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Token'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Me
      description: 获取当前登录用户信息。需携带 Bearer access token。
      operationId: me_api_v1_auth_me_get
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 当前用户信息。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserOut'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh
      description: 使用 refresh token 换取新的 access token（并轮换 refresh token）。refresh token 过期或无效返回 401。
      operationId: refresh_api_v1_auth_refresh_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RefreshRequest'}
      responses:
        '200':
          description: 刷新成功，返回新 token 包。
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Token'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
        '500': {$ref: '#/components/responses/InternalServerError'}
  /health:
    get:
      tags: [meta]
      summary: Health
      description: 健康检查。依赖（DB/Redis）可达返回 ok，否则 degraded（仍 200）。
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: HealthResponse
                required: [status, version, checks]
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  checks:
                    type: object
                    required: [database, redis]
                    properties:
                      database:
                        type: string
                        enum: [ok, down]
                      redis:
                        type: string
                        enum: [ok, down]
        '500': {$ref: '#/components/responses/InternalServerError'}
  /:
    get:
      tags: [meta]
      summary: Root
      description: 根路径。
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: {type: string}
                type: object
                title: Response Root  Get
        '500': {$ref: '#/components/responses/InternalServerError'}
  /api/v1/prompts:
    get:
      tags: [prompts]
      summary: List Prompts
      operationId: list_prompts_api_v1_prompts_get
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - {type: string}
          - {type: 'null'}
          description: 名称模糊搜索
          title: Q
        description: 名称模糊搜索
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema: {type: integer, minimum: 0, default: 0, title: Offset}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/PromptOut'}
                title: Response List Prompts Api V1 Prompts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 分页列出所有 Prompt，支持按名称模糊搜索。
    post:
      tags: [prompts]
      summary: Create Prompt
      operationId: create_prompt_api_v1_prompts_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PromptCreate'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PromptOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 创建新 Prompt 及其首个版本。
  /api/v1/prompts/{prompt_id}:
    get:
      tags: [prompts]
      summary: Get Prompt
      operationId: get_prompt_api_v1_prompts__prompt_id__get
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PromptOut'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 获取指定 Prompt 的详情（含当前版本）。
    put:
      tags: [prompts]
      summary: Update Prompt
      operationId: update_prompt_api_v1_prompts__prompt_id__put
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PromptUpdate'}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PromptOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 更新 Prompt 元数据（名称、描述），不产生新版本。
    delete:
      tags: [prompts]
      summary: Delete Prompt
      operationId: delete_prompt_api_v1_prompts__prompt_id__delete
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      responses:
        '204': {description: Successful Response}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 删除指定 Prompt 及其所有版本。
  /api/v1/prompts/{prompt_id}/versions:
    get:
      tags: [prompts]
      summary: List Versions
      operationId: list_versions_api_v1_prompts__prompt_id__versions_get
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/PromptVersionOut'}
                title: Response List Versions Api V1 Prompts  Prompt Id  Versions Get
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 列出指定 Prompt 的全部历史版本。
    post:
      tags: [prompts]
      summary: Create Version
      operationId: create_version_api_v1_prompts__prompt_id__versions_post
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PromptVersionCreate'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PromptVersionOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 为指定 Prompt 创建新版本。
  /api/v1/prompts/{prompt_id}/versions/{version_id}/rollback:
    post:
      tags: [prompts]
      summary: Rollback Version
      operationId: rollback_version_api_v1_prompts__prompt_id__versions__version_id__rollback_post
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      - name: version_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Version Id}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PromptVersionOut'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 回滚到指定版本，将其设为当前版本。
  /api/v1/prompts/{prompt_id}/diff:
    get:
      tags: [prompts]
      summary: Diff Versions
      operationId: diff_versions_api_v1_prompts__prompt_id__diff_get
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Prompt Id}
      - name: from
        in: query
        required: true
        schema: {type: integer, minimum: 1, description: 起始版本号, title: From}
        description: 起始版本号
      - name: to
        in: query
        required: true
        schema: {type: integer, minimum: 1, description: 目标版本号, title: To}
        description: 目标版本号
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiffResult'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 对比两个版本号之间的内容差异。
  /api/v1/agents:
    get:
      tags: [agents]
      summary: List Agents
      operationId: list_agents_api_v1_agents_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema: {type: integer, minimum: 0, default: 0, title: Offset}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/AgentOut'}
                title: Response List Agents Api V1 Agents Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 分页列出所有 Agent。
    post:
      tags: [agents]
      summary: Create Agent
      operationId: create_agent_api_v1_agents_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AgentCreate'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AgentOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 创建新 Agent。
  /api/v1/agents/{agent_id}:
    get:
      tags: [agents]
      summary: Get Agent
      operationId: get_agent_api_v1_agents__agent_id__get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Agent Id}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AgentOut'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 获取指定 Agent 的详情。
  /api/v1/agents/{agent_id}/execute:
    post:
      tags: [agents]
      summary: Execute Agent
      operationId: execute_agent_api_v1_agents__agent_id__execute_post
      parameters:
      - name: agent_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Agent Id}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ExecuteRequest'}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ExecutionResult'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 执行指定 Agent，返回执行结果与 token 用量。
  /api/v1/workflows:
    get:
      tags: [workflows]
      summary: List Workflows
      operationId: list_workflows_api_v1_workflows_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema: {type: integer, minimum: 0, default: 0, title: Offset}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/WorkflowOut'}
                title: Response List Workflows Api V1 Workflows Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 分页列出所有工作流。
    post:
      tags: [workflows]
      summary: Create Workflow
      operationId: create_workflow_api_v1_workflows_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WorkflowDef'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/WorkflowOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 创建新工作流（DAG 编排）。
  /api/v1/workflows/{workflow_id}/execute:
    post:
      tags: [workflows]
      summary: Execute Workflow
      operationId: execute_workflow_api_v1_workflows__workflow_id__execute_post
      parameters:
      - name: workflow_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Workflow Id}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ExecuteRequest'}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ExecutionResult'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 执行指定工作流，返回执行追踪。
  /api/v1/knowledge-bases:
    get:
      tags: [knowledge-bases]
      summary: List Kbs
      operationId: list_kbs_api_v1_knowledge_bases_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema: {type: integer, minimum: 0, default: 0, title: Offset}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/KnowledgeBaseOut'}
                title: Response List Kbs Api V1 Knowledge Bases Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 分页列出所有知识库。
    post:
      tags: [knowledge-bases]
      summary: Create Kb
      operationId: create_kb_api_v1_knowledge_bases_post
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/KnowledgeBaseCreate'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBaseOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 创建新知识库。
  /api/v1/knowledge-bases/{kb_id}:
    get:
      tags: [knowledge-bases]
      summary: Get Kb
      operationId: get_kb_api_v1_knowledge_bases__kb_id__get
      parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Kb Id}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBaseOut'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 获取指定知识库的详情。
  /api/v1/knowledge-bases/{kb_id}/documents:
    post:
      tags: [knowledge-bases]
      summary: Upload Document
      operationId: upload_document_api_v1_knowledge_bases__kb_id__documents_post
      parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Kb Id}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: {$ref: '#/components/schemas/Body_upload_document_api_v1_knowledge_bases__kb_id__documents_post'}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DocumentOut'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}
      description: 上传文档到指定知识库，进入异步分块与向量化队列。
  /api/v1/knowledge-bases/{kb_id}/search:
    post:
      tags: [knowledge-bases]
      summary: Search Kb
      operationId: search_kb_api_v1_knowledge_bases__kb_id__search_post
      parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid, title: Kb Id}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SearchQuery'}
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SearchResult'}
                title: Response Search Kb Api V1 Knowledge Bases  Kb Id  Search Post
        '400': {$ref: '#/components/responses/BadRequest'}
        '404': {$ref: '#/components/responses/NotFound'}
        '422':
          description: Validation Error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HTTPValidationError'}
        '500': {$ref: '#/components/responses/InternalServerError'}

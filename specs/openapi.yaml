  responses:
    BadRequest:
      description: 请求格式或语义错误（400 Bad Request）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Unauthorized:
      description: 未认证或凭据无效（401 Unauthorized）。error 为 token_invalid 或 token_expired。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Forbidden:
      description: 无权限访问该资源（403 Forbidden）。error 为 permission_denied。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    NotFound:
      description: 资源不存在（404 Not Found）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    Conflict:
      description: 资源冲突，如 email 或唯一字段重复（409 Conflict）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    TooManyRequests:
      description: 请求频率超限（429 Too Many Requests）。error 为 rate_limited。
      headers:
        X-RateLimit-Limit:
          description: 窗口内允许的请求总数。
          schema: {type: integer}
        X-RateLimit-Remaining:
          description: 窗口内剩余请求数。
          schema: {type: integer}
        X-RateLimit-Reset:
          description: 窗口重置时间（Unix 时间戳）。
          schema: {type: integer}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    UnprocessableEntity:
      description: 请求参数校验失败（422 Validation Error），统一错误格式。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    BadGateway:
      description: 上游 LLM 服务调用失败（502 Bad Gateway）。error 为 llm_error。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}
    InternalServerError:
      description: 服务器内部错误（500 Internal Server Error）。
      content:
        application/json:
          schema: {$ref: '#/components/schemas/Error'}

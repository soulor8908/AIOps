        temperature:
          type: number
          maximum: 2.0
          minimum: 0.0
          title: Temperature
          default: 0.7
      type: object
      required: [name]
      title: AgentCreate
      description: 创建 Agent 入参。
    AgentNode:
      properties:
        id: {type: string, title: Id}
        agent_id:
          anyOf:
          - {type: string, format: uuid}
          - {type: 'null'}
          title: Agent Id
        name: {type: string, title: Name}
        inputs: {additionalProperties: true, type: object, title: Inputs}
        is_entry: {type: boolean, title: Is Entry, default: false}
        is_exit: {type: boolean, title: Is Exit, default: false}
      type: object
      required: [id, name]
      title: AgentNode
      description: 工作流节点定义。
    AgentOut:
      properties:
        id: {type: string, format: uuid, title: Id}
